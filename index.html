<!DOCTYPE html>
<html>
<head>
    <title>Student Utility Hub</title>
    <meta name="google-site-verification" content="141SoJcGL-_ihn5JUWiVyRlIAJCVtyhlgdPvx3hLk1M" />
    <meta name="description" content="Free online student calculators including CGPA, GCD, Percentage and Binary converters.">
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            text-align: center;
        }
        header {
            background: #222;
            color: white;
            padding: 15px;
        }
        .container {
            padding: 30px;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 85%;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        footer {
            margin-top: 40px;
            padding: 15px;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Student Utility Hub</h1>
    <p>Free Online Calculators for Students</p>
</header>

<div class="container">

<div class="box">
    <h3><a href="gcd-calculator.html">GCD Calculator</a></h3>
    <h3><a href="cgpa-calculator.html">CGPA Calculator</a></h3>
    <h3><a href="attendance-calculator.html">Attendance Calculator</a></h3>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button onclick="calculateGCD()">Calculate</button>
    <p id="gcdResult"></p>
</div>

<div class="box">
    <h3>Percentage Calculator</h3>
    <input type="number" id="total" placeholder="Total Marks">
    <input type="number" id="obtained" placeholder="Obtained Marks">
    <button onclick="calculatePercentage()">Calculate</button>
    <p id="percentResult"></p>
</div>

<div class="box">
    <h3>Binary to Decimal Converter</h3>
    <input type="text" id="binary" placeholder="Enter Binary Number">
    <button onclick="convertBinary()">Convert</button>
    <p id="binaryResult"></p>
</div>

</div>

<footer>
    © 2026 Student Utility Hub | Free Academic Tools
</footer>

<script>
function calculateGCD() {
    let a = document.getElementById("num1").value;
    let b = document.getElementById("num2").value;

    while (b != 0) {
        let temp = b;
        b = a % b;
        a = temp;
    }

    document.getElementById("gcdResult").innerText = "GCD = " + a;
}

function calculatePercentage() {
    let total = document.getElementById("total").value;
    let obtained = document.getElementById("obtained").value;

    let percent = (obtained / total) * 100;
    document.getElementById("percentResult").innerText = "Percentage = " + percent.toFixed(2) + "%";
}

function convertBinary() {
    let binary = document.getElementById("binary").value;
    let decimal = parseInt(binary, 2);

    document.getElementById("binaryResult").innerText = "Decimal = " + decimal;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Utility Hub | Smart Academic Tools</title>
<meta name="description" content="Modern academic tool platform with calculators students frequently search for.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f172a;
--card:rgba(255,255,255,0.06);
--text:#f1f5f9;
--accent:#3b82f6;
--glow:rgba(59,130,246,0.4);
}

.light{
--bg:#f4f6f9;
--card:rgba(255,255,255,0.8);
--text:#111827;
--accent:#2563eb;
--glow:rgba(37,99,235,0.3);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
transition:0.4s ease;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 40px;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(15px);
}

nav h2{
margin:0;
font-weight:700;
}

nav button{
padding:8px 15px;
border:none;
background:var(--accent);
color:white;
border-radius:8px;
cursor:pointer;
}

.container{
max-width:1200px;
margin:80px auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:35px;
}

.card{
background:var(--card);
padding:25px;
border-radius:20px;
backdrop-filter:blur(20px);
box-shadow:0 20px 40px rgba(0,0,0,0.3);
transition:0.4s ease;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 25px 60px rgba(0,0,0,0.5);
}

.card h3{
margin-top:0;
font-weight:600;
}

input, textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
outline:none;
}

button.calc{
width:100%;
padding:10px;
background:var(--accent);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:10px;
font-weight:600;
}

footer{
margin-top:100px;
padding:40px;
text-align:center;
background:rgba(0,0,0,0.3);
}

footer a{
color:var(--text);
text-decoration:none;
margin:0 15px;
font-size:14px;
}

@media(max-width:600px){
nav{
flex-direction:column;
gap:15px;
}
}
</style>
</head>

<body>

<nav>
<h2>Student Utility Hub</h2>
<button onclick="toggleMode()">Toggle Mode</button>
</nav>

<div class="container">
<div class="grid">

<div class="card">
<h3>Final Exam Marks Needed</h3>
<input type="number" id="currentScore" placeholder="Current Score (%)">
<input type="number" id="targetScore" placeholder="Target Overall (%)">
<input type="number" id="finalWeight" placeholder="Final Exam Weightage (%)">
<button class="calc" onclick="finalExamCalc()">Calculate</button>
<div class="result" id="finalExamResult"></div>
</div>

<div class="card">
<h3>Required GPA for Target CGPA</h3>
<input type="number" id="currentCgpa" placeholder="Current CGPA">
<input type="number" id="targetCgpa" placeholder="Target CGPA">
<input type="number" id="completedSem" placeholder="Completed Semesters">
<button class="calc" onclick="requiredGPA()">Calculate</button>
<div class="result" id="requiredGPAResult"></div>
</div>

<div class="card">
<h3>Percentage ↔ CGPA</h3>
<input type="number" id="percentageInput" placeholder="Enter Percentage">
<button class="calc" onclick="percentageToCgpa()">Convert</button>
<div class="result" id="percentageResult"></div>
</div>

<div class="card">
<h3>Word & Character Counter</h3>
<textarea id="textInput" rows="3"></textarea>
<button class="calc" onclick="wordCounter()">Count</button>
<div class="result" id="wordResult"></div>
</div>

<div class="card">
<h3>Binary to Decimal</h3>
<input type="text" id="binaryInput" placeholder="Enter Binary">
<button class="calc" onclick="binaryToDecimal()">Convert</button>
<div class="result" id="binaryResult"></div>
</div>

<div class="card">
<h3>Linear Equation Solver</h3>
<input type="number" id="aVal" placeholder="a">
<input type="number" id="bVal" placeholder="b">
<input type="number" id="cVal" placeholder="c">
<button class="calc" onclick="solveEquation()">Solve</button>
<div class="result" id="equationResult"></div>
</div>

</div>
</div>

<footer>
<div>© 2026 Student Utility Hub</div>
<div style="margin-top:15px;">
<a href="about.html">About</a>
<a href="privacy-policy.html">Privacy Policy</a>
<a href="contact.html">Contact</a>
<a href="disclaimer.html">Disclaimer</a>
</div>
</footer>

<script>
function toggleMode(){
document.body.classList.toggle("light");
}

function finalExamCalc(){
let current=currentScore.value;
let target=targetScore.value;
let weight=finalWeight.value/100;
let required=((target - (current*(1-weight)))/weight);
finalExamResult.innerText="You need "+required.toFixed(2)+"% in final exam";
}

function requiredGPA(){
let current=currentCgpa.value;
let target=targetCgpa.value;
let sem=completedSem.value;
let needed=(target*(sem+1) - current*sem);
requiredGPAResult.innerText="You need GPA "+needed.toFixed(2)+" next semester";
}

function percentageToCgpa(){
let cgpa=percentageInput.value/9.5;
percentageResult.innerText="CGPA = "+cgpa.toFixed(2);
}

function wordCounter(){
let text=textInput.value.trim();
let words=text==""?0:text.split(/\s+/).length;
let chars=text.length;
wordResult.innerText="Words: "+words+" | Characters: "+chars;
}

function binaryToDecimal(){
let val=parseInt(binaryInput.value,2);
binaryResult.innerText="Decimal = "+val;
}

function solveEquation(){
let x=(cVal.value-bVal.value)/aVal.value;
equationResult.innerText="x = "+x;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Student Utility Hub</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 80%;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Student Utility Hub</h1>

<div class="box">
    <h3>GCD Calculator</h3>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button onclick="calculateGCD()">Calculate</button>
    <p id="gcdResult"></p>
</div>

<script>
function calculateGCD() {
    let a = document.getElementById("num1").value;
    let b = document.getElementById("num2").value;

    while (b != 0) {
        let temp = b;
        b = a % b;
        a = temp;
    }

    document.getElementById("gcdResult").innerText = "GCD = " + a;
}
</script>

</body>
</html>

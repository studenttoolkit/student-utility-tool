<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Utility Hub | Smart Academic Tools</title>

<style>
:root{
--bg:#0f172a;
--card:rgba(30,41,59,0.7);
--text:#f1f5f9;
--accent:#3b82f6;
--hover:#2563eb;
--glass:rgba(255,255,255,0.05);
}

.light{
--bg:#f4f6f9;
--card:rgba(255,255,255,0.7);
--text:#111827;
--accent:#2563eb;
--hover:#1d4ed8;
--glass:rgba(0,0,0,0.05);
}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

.app{
display:flex;
min-height:100vh;
}

.sidebar{
width:220px;
background:var(--card);
backdrop-filter:blur(15px);
padding:20px;
box-shadow:4px 0 20px rgba(0,0,0,0.3);
}

.sidebar h2{
margin-top:0;
}

.sidebar a{
display:block;
margin:15px 0;
text-decoration:none;
color:var(--text);
font-weight:500;
}

.main{
flex:1;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.search{
padding:10px;
width:250px;
border-radius:8px;
border:none;
outline:none;
}

.toggle{
padding:8px 15px;
border:none;
background:var(--accent);
color:white;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:var(--card);
backdrop-filter:blur(20px);
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.card h3{
margin-top:0;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
outline:none;
}

.calc-btn{
width:100%;
padding:10px;
background:var(--accent);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:10px;
font-weight:bold;
}

@media(max-width:768px){
.app{
flex-direction:column;
}
.sidebar{
width:100%;
display:flex;
overflow:auto;
}
.sidebar a{
margin:0 15px;
}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<h2>Utility Hub</h2>
<a href="#">Attendance</a>
<a href="#">CGPA</a>
<a href="#">Math Tools</a>
<a href="#">Finance</a>
</div>

<div class="main">

<div class="topbar">
<input type="text" class="search" placeholder="Search tools...">
<button class="toggle" onclick="toggleMode()">Toggle Mode</button>
</div>

<div class="grid">

<!-- Attendance Required -->
<div class="card">
<h3>Attendance Required</h3>
<input type="number" id="attended" placeholder="Attended">
<input type="number" id="total" placeholder="Total">
<input type="number" id="required" placeholder="Required %">
<button class="calc-btn" onclick="attendanceRequired()">Calculate</button>
<div class="result" id="attendanceResult"></div>
</div>

<!-- CGPA -->
<div class="card">
<h3>CGPA to Percentage</h3>
<input type="number" id="cgpa" placeholder="Enter CGPA">
<button class="calc-btn" onclick="cgpaConvert()">Convert</button>
<div class="result" id="cgpaResult"></div>
</div>

<!-- GCD -->
<div class="card">
<h3>GCD Calculator</h3>
<input type="number" id="num1" placeholder="First">
<input type="number" id="num2" placeholder="Second">
<button class="calc-btn" onclick="calcGCD()">Calculate</button>
<div class="result" id="gcdResult"></div>
</div>

<!-- Percentage Increase -->
<div class="card">
<h3>Percentage Increase</h3>
<input type="number" id="oldVal" placeholder="Old">
<input type="number" id="newVal" placeholder="New">
<button class="calc-btn" onclick="percentIncrease()">Calculate</button>
<div class="result" id="percentResult"></div>
</div>

</div>
</div>
</div>

<script>
function toggleMode(){
document.body.classList.toggle("light");
}

function attendanceRequired(){
let a=attended.value,t=total.value,r=required.value,x=0;
while(((a*1+x)/(t*1+x))*100<r){x++;}
attendanceResult.innerText="Attend "+x+" more classes";
}

function calcGCD(){
let a=num1.value,b=num2.value;
while(b!=0){let temp=b;b=a%b;a=temp;}
gcdResult.innerText="GCD = "+a;
}

function percentIncrease(){
let p=((newVal.value-oldVal.value)/oldVal.value)*100;
percentResult.innerText="Increase = "+p.toFixed(2)+"%";
}
</script>

</body>
</html>

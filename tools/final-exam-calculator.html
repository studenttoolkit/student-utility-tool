<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Exam Marks Needed Calculator</title>
<meta name="description" content="Calculate how much you need to score in your final exam to reach your target overall percentage.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0f172a;
color:#f1f5f9;
}

.container{
max-width:700px;
margin:80px auto;
padding:30px;
background:#1e293b;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h1{
margin-top:0;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:15px;
font-weight:600;
}

a{
color:#3b82f6;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Final Exam Marks Needed Calculator</h1>

<p>Use this calculator to determine how much you need to score in your final exam to reach your desired overall percentage.</p>

<input type="number" id="currentScore" placeholder="Current Score (%)">
<input type="number" id="targetScore" placeholder="Target Overall (%)">
<input type="number" id="finalWeight" placeholder="Final Exam Weightage (%)">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<br>
<a href="../index.html">← Back to Home</a>

</div>

<script>
function calculate(){
let current=currentScore.value;
let target=targetScore.value;
let weight=finalWeight.value/100;

let required=((target - (current*(1-weight)))/weight);

result.innerText="You need "+required.toFixed(2)+"% in the final exam.";
}
</script>

</body>
</html>

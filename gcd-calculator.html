<!DOCTYPE html>
<html>
<head>
    <title>Free GCD Calculator Online</title>
    <meta name="description" content="Calculate the Greatest Common Divisor (GCD) instantly with this free online calculator.">
    <meta name="keywords" content="GCD calculator, greatest common divisor calculator online">
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 20px;
            margin: auto;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 85%;
        }
        button {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        a {
            display: block;
            margin-bottom: 20px;
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<a href="index.html">← Back to Home</a>

<h1>GCD Calculator</h1>

<div class="box">
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button onclick="calculateGCD()">Calculate</button>
    <p id="result"></p>
</div>

<script>
function calculateGCD() {
    let a = document.getElementById("num1").value;
    let b = document.getElementById("num2").value;

    while (b != 0) {
        let temp = b;
        b = a % b;
        a = temp;
    }

    document.getElementById("result").innerText = "GCD = " + a;
}
</script>

</body>
</html>
